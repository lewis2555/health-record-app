name: Build Android APK
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool libtool-bin \
          pkg-config libncurses-dev zlib1g zlib1g-dev libssl-dev libffi-dev \
          build-essential libsqlite3-dev liblzma-dev
    - name: Install Buildozer
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython
    - name: Build APK with Buildozer
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        buildozer -v android debug
    - name: Upload APK artifact
      uses: actions/upload-artifact@v5
      with:
        name: health-record-apk
        path: bin/*.apk
